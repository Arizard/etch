{{ define "main" }}
<article class="section posts">
    <header class="hugo-section-header">
        All Blog Posts
    </header>
    {{- $pages := where site.RegularPages.ByPublishDate.Reverse "Section" "posts" -}}
    {{- range $pages }}
    {{- partial "post-card.html" . -}}
    {{- end }}
</article>
{{ end }}
