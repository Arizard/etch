{{ define "main" }}
<article class="content index">
    <section>
        {{- .Content -}}
    </section>
</article>
<main>
    <article class="posts index">
        {{- $pages := where site.RegularPages.ByPublishDate.Reverse "Section" "posts" -}}
        {{- range $pages }}
        {{- partial "post-card.html" . -}}
        {{- end }}
    </article>
</main>
{{ end }}
