<nav id="breadcrumbs">
  <div class="breadcrumbs-list primary">
    <div class="site-title breadcrumbs-item"><a alt="Arie's Blog" href="/">{{ .Site.Title }}</a></div>
    {{- range .Site.Menus.main -}}
    <div class="breadcrumbs-item navlink"><a alt="{{ .Title }}" href="{{ .URL }}">{{ title .Title }}</a></div>
    {{- end -}}
    <div class="breadcrumbs-item navlink">
      <a alt="rss" href="{{- urls.AbsURL "index.xml" -}}">RSS</a>
    </div>
  </div>
  <div class="breadcrumbs-list secondary">
    {{- with .Site.Params.greeting -}}
      {{- . -}}
    {{- else -}}
      &nbsp;
    {{- end -}}
  </div>
</nav>
