<header class="site-header-container">
  <div class="site-header">
    <div class="primary">
      <a alt="{{ .Site.Title }}" href="/" class="site-title">{{- partial "svg.html" "logo.svg" -}}</a>
      {{ with .Site.Params.greeting -}}<p class="greeting">{{- . -}}</p>{{- end -}}
    </div>
    <nav>
      {{- $page := . -}}
      {{- range .Site.Menus.main -}}
      <div><a
          {{ if or ($page.IsMenuCurrent .Menu .) (and (eq $page.Section "posts") (eq .Name "index")) -}}
          class="menu-item active"
          {{- end -}}
          alt="{{ .Title }}" href="{{ .URL }}">{{ title .Title }}</a></div>
      {{- end -}}
    </nav>
  </div>
</header>
