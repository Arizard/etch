{{ define "main" }}
<article class="section content">
    <header class="hugo-section-header">
        <h1>{{ .Title }}</h1>
    </header>
    <section class="hugo-content">
        {{- .Content -}}
    </section>
</article>
<article class="section posts">
    {{- $pages := where site.RegularPages.ByPublishDate.Reverse "Section" .Section -}}
    {{- range $pages }}
    {{- partial "post-card.html" . -}}
    {{- end }}
</article>
{{ end }}
