{{- if .IsBlock -}}
<div class="figure-container {{ with .Attributes.class -}}{{ . }}{{- end -}}">
  <figure>
      {{- $keepOriginal := .Attributes.original -}}
      {{- $u := urls.Parse (.Destination | safeURL) -}}
      {{- $src := $u.String -}}
      {{- $original := or (.Page.Resources.Get $u.Path) (resources.Get $u.Path) -}}
      {{- if and (not $u.IsAbs) (not $keepOriginal) -}}
        {{- with $original -}}
          {{- $resized := .Process "fit 800x4800 q85" -}}
          {{- $src = $resized.Permalink -}}
        {{- end -}}
      {{- end -}}

      <img
        loading="lazy"
        src="{{ $src }}"
        {{- with .PlainText }} alt="{{ . }}"{{ end -}}
        {{- with .Title }} title="{{ . }}"{{ end -}}
      >
    <figcaption>
      {{- if and .Title .PlainText -}}
      <p><strong>{{- .Title -}}</strong>&nbsp;&nbsp;{{ .PlainText -}}</p>
      {{- else if .PlainText -}}
      <p>{{- .PlainText -}}</p>
      {{- end -}}
    </figcaption>
    </figure>
</div>
{{- else -}}
<img src="{{ .Destination | safeURL }}"
  {{- with .PlainText }} alt="{{ . }}"{{ end -}}
  {{- with .Title }} title="{{ . }}"{{ end -}}
>
{{- end -}}
{{- /* chomp trailing newline */ -}}
